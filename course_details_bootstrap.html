<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="card-title">{{ course.name }}</h1>
            </div>
            <div class="card-body">
                <h3 class="text-secondary mb-4">Related Lessons</h3>
                
                <ul class="list-group">
                    {% if lessons %}
                        {% for lesson in lessons %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                {{ lesson.title }}
                                <span class="badge bg-secondary rounded-pill">Lesson {{ forloop.counter }}</span>
                            </li>
                        {% endfor %}
                    {% else %}
                        <li class="list-group-item text-muted">No lessons available for this course.</li>
                    {% endif %}
                </ul>
                
                <div class="mt-4">
                    <a href="#" class="btn btn-outline-primary">Back to Courses</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
